services:
  server:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DB_PATH: /data/zenithpulse.db
      PORT: 3001
    volumes:
      - zenithpulse-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3001/api/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  zenithpulse-data:
